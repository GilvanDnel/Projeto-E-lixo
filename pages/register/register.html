<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="register.css" />
  <link rel="stylesheet" href="../../index.css" />
</head>

<body>
  <!-- Navbar -->
  <header class="navbar">
    <ul class="nav-list">
      <li class="nav-item mx-2">
        <a class="nav-link text-white" href="../../index.html">Início</a>
      </li>
    </ul>
  </header>

  <!-- Formulário centralizado -->
  <div class="form-container">
    <form>
      <h2>Criar Conta</h2>

      <!-- Nome -->
      <div class="form-field">
        <label for="name">Nome completo</label>
        <input type="text" id="name" onchange="onChangeName()" />
        <div class="error" id="name-required-error">Nome é obrigatório</div>
      </div>

      <!-- Email -->
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" onchange="onChangeEmail()" />
        <div class="error" id="IncompletError">Campo Obrigatório</div>
        <div class="error" id="emailInvalidError">Email Inválido</div>
      </div>

      <!-- Senha -->
      <div class="form-field">
        <label for="password">Senha</label>
        <input type="password" id="password" onchange="onChangePassword()" />
        <div class="error" id="password-Required-Error">Campo Obrigatório</div>
        <div class="error" id="Password-Minim-Error">Mínimo 8 caracteres</div>
      </div>

      <!-- Confirmar senha -->
      <div class="form-field">
        <label for="confirmPassword">Confirmar senha</label>
        <input type="password" id="confirmPassword" onchange="onChangeConfirmPassword()" />
        <div class="error" id="password-doesnt-match-error">Senhas não coincidem</div>
      </div>

      <!-- Botão Registrar -->
      <div class="form-field">
        <button type="button" class="solid" id="register-button" disabled onclick="register()">Registrar</button>
      </div>

      <!-- Botão voltar ao login -->
      <div class="form-field">
        <button type="button" class="link" onclick="window.location.href='../../index.html'">Já tem conta? Login</button>
      </div>
    </form>
  </div>

  <!-- Scripts -->
  <script src="register.js"></script>
  <script src="../../validation.js"></script>
  <script src="../../loading.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
  <script src="../../firebase-init.js"></script>
</body>

</html>
