<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Senha</title>

  <!-- Estilos globais e locais -->
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="recover.css" />
  <link rel="stylesheet" href="../../index.css" />
</head>

<body>
  <header class="navbar">
    <ul class="nav-list">
      <li class="nav-item mx-2">
        <a class="nav-link text-white" href="../../index.html">Início</a>
      </li>
    </ul>
  </header>

  <div class="form-container">
    <form>
      <h2>Recuperar Senha</h2>

      <!-- Campo de email -->
      <div class="form-field">
        <label for="recoverEmail">Email</label>
        <input type="email" id="recoverEmail" placeholder="seu@email.com" onchange="onChangeEmail()" />
        <div class="error" id="recover-email-error">Campo Obrigatório</div>
      </div>

      <!-- Botão Enviar -->
      <div class="form-field">
        <button type="button" class="solid" onclick="recoverPassword()">Enviar Email</button>
      </div>

      <!-- Botão Voltar -->
      <div class="form-field">
        <button type="button" class="link" onclick="window.location.href='../../index.html'">Voltar ao login</button>
      </div>
    </form>
  </div>

  <!-- Firebase e scripts -->
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>

  <script src="../../firebase-init.js"></script>
  <script src="../../validation.js"></script>
  <script src="../../loading.js"></script>
  <script src="recover.js"></script>
</body>

</html>
